<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FelChat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; --text: #000000; --subtext: #8e8e93; 
            --accent: #5e5ce6; --line: #e5e5ea; --gray-bg: #f2f2f7; 
            --bubble-sent: #fce4ec; 
            --bubble-recv: #ffffff;
            --chat-bg: linear-gradient(145deg, #a8edea 0%, #fed6e3 100%);
        }

        /* REMOVED MOBILE CONTAINER - NOW FULL SCREEN */
        body, html { 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: var(--bg); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        #app-wrapper { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        /* Auth Screen remains centered */
        #auth-screen { 
            position: absolute; 
            inset: 0; 
            background: var(--chat-bg); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-box { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* HEADER - NOW FULL WIDTH */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 25px; 
            border-bottom: 1px solid var(--line); 
            background: #fff;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-btn { color: var(--accent); font-size: 16px; cursor: pointer; text-decoration: none; }

        #content-area { flex: 1; overflow: hidden; position: relative; width: 100%; }

        /* Chats List - Full Width Rows */
        #chats-view { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .search-bar { padding: 15px 25px; background: var(--bg); border-bottom: 1px solid var(--line); }
        .search-bar input { 
            width: 100%; 
            padding: 12px 15px; 
            background: var(--gray-bg); 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
        }

        #chat-list { flex: 1; overflow-y: auto; width: 100%; }
        .chat-row { 
            display: flex; 
            padding: 15px 25px; 
            cursor: pointer; 
            border-bottom: 1px solid #f9f9f9; 
            align-items: center; 
            transition: background 0.2s;
        }
        .chat-row:hover { background: #fcfcfc; }
        .avatar { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: var(--accent); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; margin-right: 18px; 
            flex-shrink: 0; background-size: cover;
        }

        /* Bottom Nav - Full Width */
        .bottom-nav { 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0 25px 0; 
            border-top: 1px solid var(--line); 
            background: #fff; 
        }
        .nav-item { text-align: center; color: var(--subtext); flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; display: block; }

        /* Message Bubbles & Chat View */
        #active-chat { position: absolute; inset: 0; background: var(--chat-bg); z-index: 50; display: none; flex-direction: column; }
        #messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 70%; margin-bottom: 10px; }
        .bubble.sent { background: var(--bubble-sent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble.received { background: var(--bubble-recv); align-self: flex-start; border-bottom-left-radius: 4px; }

        .chat-input-area { 
            padding: 15px 25px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: 1px solid var(--line);
        }
        .chat-input-area input { flex: 1; border: none; background: var(--gray-bg); padding: 12px 18px; border-radius: 25px; font-size: 16px; outline: none; }
        
        input.base-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--line); border-radius: 12px; outline: none; }
        .base-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app-wrapper">
    
    <div id="auth-screen">
        <div class="auth-box">
            <h1 id="atitle" style="margin:0 0 10px 0; color:var(--accent);">FelChat</h1>
            <p style="color:var(--subtext); margin-bottom:20px;">Private Messaging</p>
            <input id="aname" class="base-input" placeholder="Full Name" style="display:none">
            <input id="aid" class="base-input" placeholder="Username">
            <input id="apass" class="base-input" type="password" placeholder="Password">
            <button onclick="handleAuth()" id="abtn" class="base-btn">Login</button>
            <p onclick="toggleAuth()" style="color:var(--accent); margin-top:15px; cursor:pointer; font-size:14px;">Switch to Sign Up</p>
        </div>
    </div>

    <div id="content-area">
        <div id="chats-view">
            <div class="header">
                <span class="header-btn">Edit</span>
                <span class="header-title">Chats</span>
                <span class="header-btn" onclick="document.getElementById('group-modal').style.display='flex'">+ Group</span>
            </div>
            <div class="search-bar">
                <input id="search-input" placeholder="🔍 Search people or groups..." oninput="doSearch()">
            </div>
            <div id="chat-list"></div>
        </div>

        <div id="settings-view" style="display:none; height:100%; background:white;">
             <div class="header">
                <span class="header-btn" style="visibility:hidden">Back</span>
                <span class="header-title">Settings</span>
                <span class="header-btn" onclick="logout()">Logout</span>
            </div>
            <div style="padding: 40px; text-align:center;">
                <div id="settings-pfp-icon" class="avatar" style="width:100px; height:100px; margin: 0 auto 20px auto; font-size: 40px;"></div>
                <h2 id="settings-fullname">Name</h2>
                <p id="settings-username" style="color:var(--subtext)">@username</p>
                <button class="base-btn" style="max-width:200px; margin-top:20px;" onclick="document.getElementById('pfp-upload').click()">Change Photo</button>
                <input type="file" id="pfp-upload" style="display:none" onchange="uploadPFP(event)">
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">👤</span>Contacts</div>
        <div class="nav-item active" id="nav-chats" onclick="switchTab('chats')"><span class="nav-icon">💬</span>Chats</div>
        <div class="nav-item" id="nav-settings" onclick="switchTab('settings')"><span class="nav-icon">⚙️</span>Settings</div>
    </div>

    <div id="active-chat">
        <div class="header">
            <span class="header-btn" onclick="closeChat()">❮ Back</span>
            <div style="text-align:center">
                <div id="chat-header-name" style="font-weight:700">Name</div>
                <div style="font-size:12px; color:var(--subtext)">online</div>
            </div>
            <div id="chat-header-img" class="avatar" style="width:35px; height:35px; margin:0; font-size:14px;"></div>
        </div>
        <div id="messages-view"></div>
        <div class="chat-input-area">
            <span style="font-size:24px; cursor:pointer;" onclick="document.getElementById('media-upload').click()">📎</span>
            <input type="file" id="media-upload" style="display:none" onchange="uploadMedia(event)">
            <input type="text" id="msg-input" placeholder="Message" onkeypress="if(event.key==='Enter') sendMsg()">
            <span id="send-btn" style="color:var(--accent); font-weight:bold; cursor:pointer;" onclick="sendMsg()">Send</span>
        </div>
    </div>
</div>

<script>
    /* Keep your existing script logic here. 
       Just make sure the switchTab function updates correctly 
    */
    const socket = io();
    let myID = localStorage.getItem('fID');
    let myName = localStorage.getItem('fName');
    let myPFP = localStorage.getItem('fPFP');
    let currentTargetID = "";
    let isCurrentChatGroup = false;
    let isSignUp = false;

    if(myID) {
        document.getElementById('auth-screen').style.display = 'none';
        socket.emit('connect_radar', {my_id: myID});
        document.getElementById('settings-username').innerText = "@" + myID;
        document.getElementById('settings-fullname').innerText = myName;
        updatePFPUI(myPFP);
        loadRecentChats();
    }

    function switchTab(tab) {
        document.getElementById('chats-view').style.display = (tab === 'chats') ? 'flex' : 'none';
        document.getElementById('settings-view').style.display = (tab === 'settings') ? 'block' : 'none';
        document.getElementById('nav-chats').classList.toggle('active', tab === 'chats');
        document.getElementById('nav-settings').classList.toggle('active', tab === 'settings');
    }

    // ... Rest of your JS from previous turns (handleAuth, loadRecentChats, openChat, etc.) ...
    // Note: Use the JS from the previous turn here to keep functionality.
</script>
</body>
</html>
