<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaelChat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <div class="app-shell">
        <section id="auth-screen" class="auth-screen">
            <div class="auth-card glass-card">
                <div class="brand-pill">FaelChat</div>
                <h1 id="auth-title">Welcome back</h1>
                <p id="auth-subtitle">Modern private chat with media sharing.</p>
                <input id="aname" class="base-input hidden" placeholder="Full Name">
                <input id="aid" class="base-input" placeholder="User ID">
                <input id="apass" class="base-input" type="password" placeholder="Password">
                <button id="abtn" class="base-btn" onclick="handleAuth()">Login</button>
                <button class="link-btn" onclick="toggleAuth()">Switch to Sign Up</button>
            </div>
        </section>

        <main id="main-app" class="main-app hidden">
            <aside class="sidebar glass-card">
                <div class="sidebar-top">
                    <div>
                        <div class="eyebrow">Your space</div>
                        <h2>Chats</h2>
                    </div>
                    <button class="icon-btn" onclick="openModal('group-modal')">＋</button>
                </div>

                <div class="search-wrap">
                    <input id="search-input" placeholder="Search users or groups" oninput="doSearch()" autocomplete="off">
                    <div id="suggestions" class="suggestions"></div>
                </div>

                <div id="chat-list" class="chat-list"></div>
            </aside>

            <section id="chat-panel" class="chat-panel glass-card empty-state">
                <div class="empty-center">
                    <div class="empty-icon">💬</div>
                    <h3>Select a chat</h3>
                    <p>Search a user ID, open a recent chat, or create a group.</p>
                </div>
            </section>

            <aside id="settings-view" class="settings-panel glass-card">
                <div class="sidebar-top">
                    <div>
                        <div class="eyebrow">Profile</div>
                        <h2>Settings</h2>
                    </div>
                    <button class="danger-ghost" onclick="logout()">Logout</button>
                </div>

                <div class="profile-card">
                    <div id="settings-pfp-icon" class="profile-avatar avatar large"></div>
                    <h3 id="settings-fullname">Name</h3>
                    <p id="settings-id">@userid</p>
                    <button class="base-btn secondary" onclick="document.getElementById('pfp-upload').click()">Change photo</button>
                    <input type="file" id="pfp-upload" accept="image/*" class="hidden" onchange="uploadPFP(event)">
                </div>
            </aside>
        </main>
    </div>

    <div id="group-modal" class="modal hidden">
        <div class="modal-card glass-card">
            <div class="modal-top">
                <h3>Create or Join Group</h3>
                <button class="icon-btn" onclick="closeModal('group-modal')">✕</button>
            </div>
            <input id="group-name" class="base-input" placeholder="Group name">
            <input id="group-code" class="base-input" placeholder="Group code">
            <div class="modal-actions two">
                <button class="base-btn secondary" onclick="joinGroup()">Join</button>
                <button class="base-btn" onclick="createGroup()">Create</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
